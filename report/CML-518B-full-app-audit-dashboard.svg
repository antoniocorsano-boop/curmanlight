    <text x="965" y="222" font-size="30" font-weight="700" fill="#7f1d1d">2 aree</text>

    <text x="60" y="310" font-size="24" font-weight="700" fill="#0f172a">Maturità per area</text>

    <g font-size="16">
      <text x="60" y="355" fill="#334155">Baseline prodotto</text><rect x="300" y="337" width="950" height="24" rx="12" fill="#e2e8f0"/><rect x="300" y="337" width="902" height="24" rx="12" fill="#22c55e"/><text x="1270" y="355" fill="#0f172a">95%</text>
