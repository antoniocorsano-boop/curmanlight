    <text x="60" y="815" font-size="24" font-weight="700" fill="#0f172a">Cinque P1 prima della release</text>
    <g font-size="17" fill="#334155">
      <text x="80" y="850">1. Pilot umano con 3–5 docenti non ancora eseguito</text>
      <text x="80" y="880">2. Audit accessibilità completo non ancora chiuso</text>
      <text x="80" y="910">3. URL React pubblico stabile non formalizzato</text>
      <text x="720" y="850">4. Conflitti e duplicati Dipartimento parziali</text>
      <text x="720" y="880">5. Consolidamento istituzionale Referente mancante</text>
    </g>

    <rect x="60" y="935" width="1280" height="28" rx="14" fill="#0f172a"/>
    <text x="700" y="955" text-anchor="middle" font-size="15" fill="#ffffff">Conclusione: app tecnicamente avanzata; il collo di bottiglia è validazione reale, accessibilità e chiusura istituzionale.</text>
