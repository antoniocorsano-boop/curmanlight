      <text x="60" y="755" fill="#334155">Modalità d’uso</text><rect x="300" y="737" width="950" height="24" rx="12" fill="#e2e8f0"/><rect x="300" y="737" width="333" height="24" rx="12" fill="#ef4444"/><text x="1270" y="755" fill="#0f172a">35%</text>
