      <text x="60" y="635" fill="#334155">Accessibilità</text><rect x="300" y="617" width="950" height="24" rx="12" fill="#e2e8f0"/><rect x="300" y="617" width="646" height="24" rx="12" fill="#f59e0b"/><text x="1270" y="635" fill="#0f172a">68%</text>
