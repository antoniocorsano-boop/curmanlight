name: Deploy CurManLight to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "_published_snapshot/netlify-current/**"
      - "curman-react/**"
      - ".github/workflows/pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "curmanlight-pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: curman-react/package-lock.json

      - name: Install React dependencies
        run: npm ci
        working-directory: curman-react

      - name: Build isolated React preview
        run: npm run build
        working-directory: curman-react
        env:
          VITE_BASE_PATH: /curmanlight/react-preview/

      - name: Prepare combined Pages artifact
        run: |
          rm -rf _site
          mkdir -p _site/react-preview
          cp -a _published_snapshot/netlify-current/. _site/
          cp -a curman-react/dist/. _site/react-preview/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload static artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
