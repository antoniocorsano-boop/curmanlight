name: CML-470 B03 Persistence Audit

# Audit script is colocated with the React workspace so ESM resolves Playwright correctly.
on:
  push:
    branches:
      - codex/cml-470-gap-layer-pilot
    paths:
      - 'content/gap/**'
      - 'curman-react/**'
      - '.github/workflows/cml-470-b03-persistence-audit.yml'
  pull_request:
    branches: [main]
    paths:
      - 'content/gap/**'
      - 'curman-react/**'
      - '.github/workflows/cml-470-b03-persistence-audit.yml'

permissions:
  contents: read

concurrency:
  group: cml-470-b03-persistence-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chromium-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: curman-react/package-lock.json
      - run: npm ci
        working-directory: curman-react
      - run: npm install --no-save playwright@1.61.1
        working-directory: curman-react
      - run: npx playwright install --with-deps chromium
        working-directory: curman-react
      - name: Start Vite dev server
        shell: bash
        run: |
          npm run dev -- --host 127.0.0.1 > /tmp/cml-470-vite.log 2>&1 &
          echo $! > /tmp/cml-470-vite.pid
        working-directory: curman-react
      - name: Wait for dev server
        shell: bash
        run: |
          for i in {1..60}; do
            if curl --fail --silent http://127.0.0.1:5173/curmanlight/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/cml-470-vite.log
          exit 1
      - name: Run decision persistence audit
        shell: bash
        working-directory: curman-react
        run: node tools/audit-gap-layer.mjs
      - name: Upload audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cml-470-b03-persistence-audit
          path: |
            report/screenshots/CML-470/revisione-ef-decision-persisted.png
            report/screenshots/CML-470/revisione-ef-mobile-persisted.png
            /tmp/cml-470-vite.log
          if-no-files-found: warn
