name: React CI

on:
  push:
    branches:
      - main
      - 'codex/**'
    paths:
      - 'curman-react/**'
      - 'content/curriculum/**'
      - '.github/workflows/react-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'curman-react/**'
      - 'content/curriculum/**'
      - '.github/workflows/react-ci.yml'

permissions:
  contents: read

concurrency:
  group: curmanlight-react-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: curman-react/package-lock.json
      - run: npm ci
        working-directory: curman-react
      - run: npm run lint
        working-directory: curman-react
      - run: npm run build
        working-directory: curman-react
