name: React CI

on:
  push:
    branches:
      - main
      - 'codex/**'
    paths:
      - 'curman-react/**'
      - 'content/curriculum/**'
      - '.github/workflows/react-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'curman-react/**'
      - 'content/curriculum/**'
      - '.github/workflows/react-ci.yml'

permissions:
  contents: read

concurrency:
  group: curmanlight-react-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: curman-react/package-lock.json
      - run: npm ci
        working-directory: curman-react
      - run: npm run lint
        working-directory: curman-react
      - run: npm run test:b01
        working-directory: curman-react
      - run: npm run test:b02
        working-directory: curman-react
      - name: Build React candidate
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee react-build.log
        working-directory: curman-react
      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: react-build-diagnostics
          path: curman-react/react-build.log
          if-no-files-found: warn
