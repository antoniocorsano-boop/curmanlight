name: CML-468 B03 Interactive Audit

on:
  push:
    branches:
      - 'codex/cml-468-b03-interactive-audit'
    paths:
      - 'curman-react/**'
      - '.github/workflows/cml-468-b03-interactive-audit.yml'
  pull_request:
    branches: [main]
    paths:
      - 'curman-react/**'
      - '.github/workflows/cml-468-b03-interactive-audit.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cml-468-b03-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: curman-react
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: curman-react/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Install Playwright runner and Chromium
        run: |
          npm install --no-save --no-package-lock @playwright/test@1.54.1
          npx playwright install --with-deps chromium
      - name: Start Vite preview
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 > cml-468-vite.log 2>&1 &
          echo $! > cml-468-vite.pid
      - name: Wait for preview
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4173 >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat cml-468-vite.log
          exit 1
      - name: Run B03 Chromium audit
        run: npx playwright test --config=playwright.audit.config.ts
      - name: Upload audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cml-468-b03-interactive-audit
          path: |
            curman-react/playwright-report
            curman-react/test-results
            curman-react/cml-468-vite.log
          if-no-files-found: warn
