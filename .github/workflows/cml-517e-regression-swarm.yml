name: CML-517E Regression Swarm

on:
  pull_request:
    branches: [main]
    paths:
      - 'curman-react/**'
      - 'agent-evaluation/**'
      - '.github/workflows/cml-517e-regression-swarm.yml'
  push:
    branches:
      - 'codex/cml-517e-regression-swarm'
    paths:
      - 'curman-react/**'
      - 'agent-evaluation/**'
      - '.github/workflows/cml-517e-regression-swarm.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cml-517e-regression-swarm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression-swarm:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: curman-react
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: curman-react/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Install Playwright runner and Chromium
        run: |
          npm install --no-save --no-package-lock @playwright/test@1.54.1
          npx playwright install --with-deps chromium
      - name: Start Vite preview
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 > cml-517e-vite.log 2>&1 &
          echo $! > cml-517e-vite.pid
      - name: Wait for preview
        run: |
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:4173 >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat cml-517e-vite.log
          exit 1
      - name: Run 30-combination regression swarm
        run: npx playwright test --config=playwright.cml517e.config.ts
      - name: Upload regression evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cml-517e-regression-swarm
          path: |
            curman-react/test-results
            curman-react/cml-517e-vite.log
          if-no-files-found: warn
