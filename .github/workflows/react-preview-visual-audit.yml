name: React Preview Visual Audit

on:
  push:
    branches:
      - 'codex/cml-449b-react-preview-visual-audit'
    paths:
      - 'tools/cml-449b-react-preview-audit.mjs'
      - '.github/workflows/react-preview-visual-audit.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Playwright
        run: npm install --no-save playwright
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run visual interaction audit
        run: node tools/cml-449b-react-preview-audit.mjs
      - name: Upload audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cml-449b-react-preview-visual-audit
          path: |
            report/CML-449B_react_preview_visual_interaction_audit.md
            report/screenshots/CML-449B/*.png
          if-no-files-found: warn
