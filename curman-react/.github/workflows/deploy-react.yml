name: Deploy CurManLight React to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "curman-react/src/**"
      - "curman-react/public/**"
      - "curman-react/package.json"
      - "curman-react/vite.config.ts"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: curmanlight-react-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: curman-react/package-lock.json
      - run: npm ci
        working-directory: curman-react
      - run: npm run build
        working-directory: curman-react
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: curman-react/dist
      - id: deployment
        uses: actions/deploy-pages@v4
