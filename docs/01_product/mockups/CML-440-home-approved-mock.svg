  </g>
  <g class="ui" fill="#fff">
    <text x="108" y="31" font-size="15">I.C. CALVARIO-COVOTTA «DON LORENZO MILANI»</text>
    <text x="108" y="62" font-size="28" font-weight="800">Curricolo Verticale</text>
    <text x="108" y="94" font-size="15">IN 2012 – D.M. 221/2025 – Ariano Irpino (AV) – AVIC849003</text>
  </g>
  <rect x="1378" y="31" width="126" height="56" rx="18" fill="none" stroke="#7890e4"/>
  <text class="ui" x="1441" y="65" fill="#fff" font-size="17" font-weight="800" text-anchor="middle">Dettagli⌄</text>

  <rect y="118" width="1536" height="72" fill="#fff" stroke="#e2e6ee"/>
  <g class="ui nav" fill="#5b6271">
    <text x="68" y="161" fill="#15309e">⌂ Home</text>
    <text x="160" y="161">▣ Curricolo</text>
    <text x="313" y="161">◇ Progetta</text>
    <text x="470" y="161">↓ Esportazioni</text>
    <text x="651" y="161">? Guida</text>
    <text x="787" y="161">⚙ Impostazioni</text>
  </g>
  <rect x="15" y="187" width="124" height="4" fill="#1836b8"/>

  <g transform="translate(134 258)">
    <text class="ui title" x="0" y="0">Cosa vuoi fare oggi?</text>
    <text class="ui lead" x="0" y="52">CurManLight collega fonti ufficiali, consultazione, revisione, progettazione didattica,</text>
    <text class="ui lead" x="0" y="85">esportazioni e validazione umana in un unico percorso di lavoro.</text>

    <g transform="translate(0 145)" filter="url(#shadow)">
      <rect width="300" height="205" rx="18" fill="url(#primary)"/>
      <g transform="translate(28 36)" color="#fff"><path class="stroke" d="M0 3c17-8 30-4 40 4v43c-10-8-23-12-40-4V3Zm40 4c10-8 23-12 40-4v43c-17-8-30-4-40 4V7Z"/></g>
      <text x="96" y="60" font-family="Inter,Segoe UI,Arial" font-size="19" font-weight="800" fill="#fff">Consulta</text>
      <text x="96" y="90" font-family="Inter,Segoe UI,Arial" font-size="19" font-weight="800" fill="#fff">il curricolo</text>
      <text x="268" y="78" font-family="Inter,Segoe UI,Arial" font-size="34" fill="#fff">›</text>
      <text x="28" y="142" font-family="Inter,Segoe UI,Arial" font-size="16" fill="#e7ebff">Leggi il curricolo vigente e</text>
      <text x="28" y="173" font-family="Inter,Segoe UI,Arial" font-size="16" fill="#e7ebff">le sezioni generali</text>
    </g>

