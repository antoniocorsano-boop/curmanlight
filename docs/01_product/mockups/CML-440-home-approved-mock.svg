      <g transform="translate(28 37)" color="#153cc5"><path class="stroke" d="M3 5h40v40H3V5Zm31-9 15 15-28 28-17 2 2-17L34-4Z"/></g>
      <text class="ui card-title" x="98" y="61">Prepara una</text>
      <text class="ui card-title" x="98" y="91">progettazione</text>
      <text x="270" y="79" font-family="Inter,Segoe UI,Arial" font-size="34" fill="#153cc5">›</text>
      <text class="ui card-text" x="28" y="142">Evidenze, programmazione</text>
      <text class="ui card-text" x="28" y="173">annuale e UDA modello</text>
    </g>

    <g transform="translate(650 145)" filter="url(#shadow)">
      <rect width="300" height="205" rx="18" fill="#fff" stroke="#d9dee9"/>
      <g transform="translate(28 37)" color="#153cc5"><path class="stroke" d="M43 9A23 23 0 0 0 6 16M6 16V3M6 16h13M3 40a23 23 0 0 0 37-7M40 33v13M40 33H27"/></g>
      <text class="ui card-title" x="98" y="61">Proponi un</text>
      <text class="ui card-title" x="98" y="91">aggiornamento</text>
      <text x="270" y="79" font-family="Inter,Segoe UI,Arial" font-size="34" fill="#153cc5">›</text>
      <text class="ui card-text" x="28" y="142">Prepara una proposta da</text>
      <text class="ui card-text" x="28" y="173">discutere in dipartimento</text>
    </g>

    <g transform="translate(975 145)" filter="url(#shadow)">
      <rect width="300" height="205" rx="18" fill="#fff" stroke="#d9dee9"/>
      <g transform="translate(28 34)" color="#153cc5"><path class="stroke" d="M24 0v38M11 25l13 13 13-13M4 38v15h40V38"/></g>
      <text class="ui card-title" x="98" y="61">Esporta</text>
      <text class="ui card-title" x="98" y="91">un documento</text>
      <text x="270" y="79" font-family="Inter,Segoe UI,Arial" font-size="34" fill="#153cc5">›</text>
      <text class="ui card-text" x="28" y="142">Documento finale, confronto,</text>
      <text class="ui card-text" x="28" y="173">file .cml e copia</text>
    </g>

    <g transform="translate(0 405)">
      <rect width="1275" height="124" rx="16" fill="#f9fbff" stroke="#cfd9f5"/>
      <g transform="translate(32 34)" color="#153cc5"><circle class="stroke" cx="24" cy="24" r="22"/><path class="stroke" d="M24 19v18M24 11h.01"/></g>
      <text class="ui" x="102" y="52" font-size="19" font-weight="800" fill="#15309e">Imposta il tuo contesto di lavoro.</text>
      <text class="ui" x="102" y="87" font-size="17" fill="#526078">Anno scolastico, ruolo, curricolo e disciplina si gestiscono in Impostazioni.</text>
      <rect x="1054" y="34" width="190" height="56" rx="12" fill="#fff" stroke="#9fb3ef"/>
      <text class="ui" x="1149" y="69" font-size="17" font-weight="800" fill="#15309e" text-anchor="middle">Vai a Impostazioni</text>
    </g>
  </g>

  <rect y="951" width="1536" height="73" fill="#263c48"/>
  <text class="footer" x="768" y="995" text-anchor="middle">Istituto Comprensivo Calvario-Covotta «don Lorenzo Milani» — Ariano Irpino (AV) • AVIC849003 | IN 2012 — D.M. 221/2025 | DigComp 2.2 | Agenda 2030 | PTOF 2025-2028 | Non multa, sed multum</text>
