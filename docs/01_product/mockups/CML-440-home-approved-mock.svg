<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="1024" viewBox="0 0 1536 1024" role="img" aria-labelledby="title desc">
  <title id="title">CML-440 — Mock Home approvato</title>
  <desc id="desc">Mock approvato della Home semplificata di CurManLight: quattro azioni principali, collegamento alle impostazioni, nessun percorso a card, nessuna card di stato e test guidato non visibile.</desc>
  <defs>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#122694"/>
      <stop offset="1" stop-color="#0d2fa4"/>
    </linearGradient>
    <linearGradient id="primary" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1836b8"/>
      <stop offset="1" stop-color="#08298e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#1a237e" flood-opacity="0.08"/>
    </filter>
    <style>
      .ui{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#15213d}.small{font-size:14px}.nav{font-size:17px;font-weight:700}.title{font-size:44px;font-weight:800;fill:#16318f}.lead{font-size:20px;fill:#33415f}.card-title{font-size:19px;font-weight:800;fill:#15309e}.card-text{font-size:16px;fill:#44516b}.footer{font-size:12px;fill:#e8edf7}.stroke{fill:none;stroke:currentColor;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>

  <rect width="1536" height="1024" fill="#ffffff"/>
  <rect width="1536" height="118" fill="url(#header)"/>

  <g transform="translate(34 30)" color="#fff">
