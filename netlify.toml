[build]
  command = "npm ci --prefix curman-react && VITE_BASE_PATH=/react-preview/ npm run build --prefix curman-react && rm -rf _site && mkdir -p _site/react-preview && cp -a _published_snapshot/netlify-current/. _site/ && cp -a curman-react/dist/. _site/react-preview/"
  publish = "_site"

[build.environment]
  NODE_VERSION = "20"

[context.production]
  command = "npm ci --prefix curman-react && VITE_BASE_PATH=/react-preview/ npm run build --prefix curman-react && rm -rf _site && mkdir -p _site/react-preview && cp -a _published_snapshot/netlify-current/. _site/ && cp -a curman-react/dist/. _site/react-preview/"

[context.deploy-preview]
  command = "npm ci --prefix curman-react && VITE_BASE_PATH=/react-preview/ npm run build --prefix curman-react && rm -rf _site && mkdir -p _site/react-preview && cp -a _published_snapshot/netlify-current/. _site/ && cp -a curman-react/dist/. _site/react-preview/"
